<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>トレジャーマップ – 技術サポート</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.6;
    }

    header {
      background: #1d1d1f;
      color: #f5f5f7;
      padding: 2rem 1.5rem;
      text-align: center;
      position: relative;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.4rem;
      color: #a1a1a6;
      font-size: 1rem;
    }

    #lang-selector {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
    }

    #lang-selector select {
      background: #2c2c2e;
      color: #f5f5f7;
      border: 1px solid #48484a;
      border-radius: 6px;
      padding: 0.35rem 0.6rem;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }

    #lang-selector select:hover {
      border-color: #636366;
    }

    main {
      max-width: 760px;
      margin: 2.5rem auto;
      padding: 0 1.5rem 3rem;
    }

    section {
      background: #ffffff;
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .08);
    }

    section h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #1d1d1f;
    }

    section p,
    section li {
      font-size: 0.975rem;
      color: #3a3a3c;
    }

    section ul {
      padding-left: 1.4rem;
    }

    /* privacy list: no bullet, we include numeric labels in the question text */
    #privacy-list {
      list-style: none;
      padding-left: 0;
      margin-top: 0.5rem;
    }

    #privacy-list li {
      margin-top: 0.9rem;
    }

    section ul li {
      margin-bottom: 0.5rem;
    }

    /* FAQ question / answer layout */
    section ul li .faq-question {
      font-weight: 700;
      display: block;
      margin-bottom: 0.25rem;
      color: #1d1d1f;
    }

    section ul li .faq-answer {
      display: block;
      color: #3a3a3c;
      white-space: pre-wrap;
      margin-left: 0.25rem;
    }

    a {
      color: #0071e3;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .contact-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.6rem 1.4rem;
      background: #0071e3;
      color: #fff;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
    }

    .contact-btn:hover {
      background: #0077ed;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #6e6e73;
    }

    .info-line {
      line-height: 1.6;
      display: flex;
      align-items: flex-start;
      gap: 0.6em;
    }

    .info-label {
      flex: 0 0 9.5em;
      text-align: right;
      margin: 0;
      /* spacing now handled by gap */
    }

    .info-label.info-label-auto {
      flex: 0 0 auto;
      text-align: left;
      width: auto;
    }

    .info-value {
      flex: 1 1 0;
      margin: 0;
      max-width: 60ch;
    }

    .info-label-auto {
      display: inline;
      width: auto;
      text-align: left;
      margin-right: 0.6em;
    }

    #about-p1 .info-line:first-of-type {
      margin-top: 0.8em;
    }

    /* Responsive: move language selector to header's bottom-right on small screens */
    @media (max-width: 600px) {
      header {
        padding: 1.25rem 1rem;
        text-align: left;
      }

      /* place selector at header's right-bottom to reduce vertical space */
      #lang-selector {
        top: auto;
        bottom: 8px;
        right: 12px;
        position: absolute;
      }

      /* enlarge touch target and ensure visibility */
      #lang-selector select {
        min-width: 44px;
        min-height: 44px;
        padding: 0.4rem 0.6rem;
        font-size: 0.95rem;
      }

      /* reserve space so title doesn't overlap the selector */
      #site-title {
        padding-right: 110px;
        font-size: 1.25rem;
      }

      header p {
        margin-top: 0.3rem;
        color: #a1a1a6;
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <div id="lang-selector">
      <select id="lang-select" onchange="setLang(this.value)">
        <option value="en">English</option>
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁体中文</option>
        <option value="ja" selected>日本語</option>
      </select>
    </div>
    <h1 id="site-title">トレジャーマップ</h1>
    <p id="header-subtitle"></p>
  </header>

  <main>

    <section>
      <div class="about-graphic-wrapper">
        <img id="about-graphic" class="protected" src="about.png" alt="About graphic" oncontextmenu="return false;"
          draggable="false">
        <script>
          document.addEventListener('contextmenu', function (e) {
            if (e.target && e.target.tagName === 'IMG') {
              e.preventDefault();
            }
          }, { capture: true });
        </script>
      </div>
      <h2 id="about-title"></h2>
      <div id="about-p1"></div>
    </section>

    <section>
      <h2 id="faq-title"></h2>
      <ul id="faq-list"></ul>
    </section>

    <section>
      <h2 id="privacy-title"></h2>
      <p id="privacy-p1"></p>
      <ul id="privacy-list"></ul>
    </section>

    <section>
      <h2 id="contact-title"></h2>
      <p id="contact-p1"></p>
      <a class="contact-btn" id="contact-btn" href="https://github.com/FrankLiQiang/TreasureMap/issues"></a>
    </section>

  </main>

  <footer id="footer-text"></footer>

  <script>
    var i18n = {
      'ja': {
        htmlLang: 'ja',
        pageTitle: 'トレジャーマップ',
        headerSubtitle: '技術サポート',
        aboutTitle: '📖 このアプリについて',
        aboutP1: 'トレジャーマップは、機密情報を保護し、文書、画像、音声、動画などの情報を見た目に目立つ変化なく安全に埋め込むクロスプラットフォームアプリです。 また、サイズに制限がなく、画像キャリアに接続する必要のない高度な暗号化機構も提供します。',
        aboutHtml: '<p>トレジャーマップは、機密情報を保護し、文書、画像、音声、動画などの情報を見た目に目立つ変化なく安全に埋め込むクロスプラットフォームアプリです。 また、サイズに制限がなく、画像キャリアに接続する必要のない高度な暗号化機構も提供します。</p><div class="info-line"><span class="info-label"><strong>主な特徴:</strong></span><span class="info-value">リスト、テキスト、ファイル、ファイル暗号化の埋め込み(画像不要)</span></div><div class="info-line"><span class="info-label"><strong>応用シナリオ:</strong></span><span class="info-value">重要な情報は異なる場所に保存・バックアップされています。</span></div><div class="info-line"><span class="info-label"><strong>対応プラットフォーム:</strong></span><span class="info-value">iOS、Android、macOS、Windows。</span></div>',
        faqTitle: '❓ よくある質問',
        faqItems: [
          { q: '隠しファイルをどうやって変更・削除すればいいですか?', a: '隠しファイルを修正したい場合は、「ファイルイ」画面→「ファイル選択」で再度画像を書き戻し、暗号化して保存します。\n非表示を解除するには、「ファイル」画面の「選択解除」をクリックしてセーブデータを暗号化してください。\n通常通り終了や切り替えを行うと、復号された隠しファイルは削除され、異常な退出が残ることがあります。' },
          { q: 'ホストイメージに頼らずにファイル自体を暗号化するにはどうすればいいですか?', a: '「ファイル自体」画面では、ファイルを個別にパスワードで暗号化できます(画像は不要)。 暗号化されたファイルはこのアプリケーションでのみ復号可能です。暗号化されたファイルは本アプリでのみ復号できます。パスワードは大切に保管してください。紛失した場合、復元できません。\n本アプリではパスワードが正しいかどうかを判定できません。誤ったパスワードで復号した結果、対応するソフトでファイルを開けない場合は、同じ（先ほど誤って入力した）パスワードを使用して、復号前の状態に復元してください。' },
          { q: '元の画像はどうやって削除すればいいですか? オーバーライドルールとは何ですか?', a: 'ホストイメージ:Windows/macOSは元のイメージを上書きします。 Android/iOSは保存するたびに新しい画像を生成します。 ユーザーは元の画像を削除する裁量があります。\n隠しファイル:復号化された隠しファイルは同じ名前のファイルを上書きします。\nファイル自体:復号または暗号化されたファイルは、同じ名前のファイルを上書きします。' },
          { q: '写真のパスワードはどうやって変更すればいいですか?', a: '元のパスワードで画像を開き、「ホーム」→「暗号化」で新しいパスワードを2回入力して確認し、情報を画像に暗号化して保存することで、画像のパスワードを変更できます。' },
          { q: 'ホストの画像はどうやって変更すればいいですか?', a: '元の画像をロック解除した後、「画像選択」をクリックして新しい画像を選択し、「暗号化」をクリックして新しい画像に情報を書き込みます。 元の画像は今でも保持可能です。' },
          { q: 'ホスト画像をどのように送信し共有すればよいのでしょうか? チェックサムとは何ですか?', a: 'クロスプラットフォーム/デバイス転送の場合は、元の画像を送信してください。そうでなければ復号できません。\n「検証コードをコピー」を使って画像のチェックサムを取得し、同じ検証コードを持つ画像だけが同じ情報を復号できます。\n元の画像と検証コードのみが共有され、情報の漏洩は一切ありません。 画像情報が解除されるのは元の画像+パスワード+このアプリケーションだけです。' }
        ],
        privacyItems: [
          { q: '1. 情報収集の説明', a: 'このアプリはユーザーの個人ファイルの内容を積極的に収集、アップロード、保存することはありません。\nこのアプリはユーザーアカウントシステムを確立していません。\nこのアプリはサーバーストレージサービスを提供していません。\nすべてのデータ処理はユーザーのローカルデバイス内で行われます。' },
          { q: '2. 許可の使用説明', a: 'この関数を実装するために、このアプリケーションは以下の権限を要求することができます:\nストレージアクセス:ホストイメージへのファイルの読み取りと非表示、ファイル自体の暗号化・復号に使用されます。\nメディアアクセス:ホスト画像に隠された情報を保存するためのもの。\n上記の権限は機能実装のみに使用され、データ収集には使用されません。' },
          { q: '3. データ転送の説明', a: 'このアプリはリモートデータ送信を行いません。\nこのアプリは、ユーザーファイルのコンテンツを第三者に提供しません。' },
          { q: '4. データセキュリティ', a: 'すべてのファイルはユーザーのデバイスにローカルに保存されます。\nユーザーはパスワードやデバイスを安全に管理すべきです。\nこのアプリにはパスワード回復機能はありません。' },
          { q: '5. 第三者サービス', a: '有料ユーザー向けには、このアプリは広告サービスを統合していません。\nこのアプリはユーザー行動分析サービスを統合していません。\n将来的に第三者サービスを統合する場合は、この方針の説明を更新します。' },
          { q: '6. 政策変更', a: 'アプリは法律により必要とされる方針や機能更新に応じて、本ポリシーを変更する権利を留保します。\n変更点はアプリ内で発表されます。' }
        ],
        privacyTitle: '🔒 プライバシーポリシー',
        contactTitle: '📬 お問い合わせ',
        contactP1: '<p>ご質問やご提案があれば、どうぞお気軽に以下までお問い合わせください:</p><p>メール:treasuremap365.lq@gmail.com</p>',
        contactBtn: '問題を報告',
        footerText: '© {year} Frank. Li Qiang · TreasureMap'
      },
    };

    function setLang(lang) {
      var t = i18n[lang];
      if (!t) return;

      document.documentElement.lang = t.htmlLang;
      document.title = t.pageTitle;
      var siteTitle = document.getElementById('site-title');
      if (siteTitle) siteTitle.textContent = t.pageTitle;
      document.getElementById('header-subtitle').textContent = t.headerSubtitle;
      document.getElementById('about-title').textContent = t.aboutTitle;

      var aboutP = t.aboutP1 || '';
      var aboutHtml = t.aboutHtml ? t.aboutHtml : null;
      if (aboutHtml) {
        // ensure label spans use the auto class so labels are left-aligned
        aboutHtml = aboutHtml.replace(/<span class="info-label">/g, '<span class="info-label info-label-auto">');
        document.getElementById('about-p1').innerHTML = aboutHtml.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
      } else {
        document.getElementById('about-p1').innerHTML = aboutP.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
      }
      // Trim leading fullwidth/normal spaces inside .info-value to avoid visible indentation
      document.querySelectorAll('#about-p1 .info-value').forEach(function (el) {
        if (!el) return;
        el.textContent = (el.textContent || '').replace(/^[\s\u3000]+/, '');
      });

      document.getElementById('faq-title').textContent = t.faqTitle;
      var faqList = document.getElementById('faq-list');
      faqList.innerHTML = '';
      (t.faqItems || []).forEach(function (item) {
        var li = document.createElement('li');
        var qEl = document.createElement('div');
        qEl.className = 'faq-question';
        qEl.textContent = item.q.replace(/^[\s\u3000]+/, '');
        var aEl = document.createElement('div');
        aEl.className = 'faq-answer';
        aEl.textContent = item.a.replace(/^[\s\u3000]+/, '');
        li.appendChild(qEl);
        li.appendChild(aEl);
        faqList.appendChild(li);
      });

      document.getElementById('privacy-title').textContent = t.privacyTitle;
      var privacyP = document.getElementById('privacy-p1');
      var privacyList = document.getElementById('privacy-list');
      if (t.privacyItems && t.privacyItems.length) {
        privacyP.style.display = 'none';
        privacyList.innerHTML = '';
        (t.privacyItems || []).forEach(function (item) {
          var li = document.createElement('li');
          var qEl = document.createElement('div');
          qEl.className = 'faq-question';
          qEl.textContent = item.q.replace(/^[\s\u3000]+/, '');
          var aEl = document.createElement('div');
          aEl.className = 'faq-answer';
          aEl.textContent = item.a.replace(/^[\s\u3000]+/, '');
          li.appendChild(qEl);
          li.appendChild(aEl);
          privacyList.appendChild(li);
        });
      } else {
        privacyList.innerHTML = '';
        privacyP.style.display = '';
        privacyP.textContent = t.privacyP1;
      }
      document.getElementById('contact-title').textContent = t.contactTitle;
      // contactP1 may contain HTML (paragraphs/links). Use innerHTML so paragraphs break correctly.
      document.getElementById('contact-p1').innerHTML = t.contactP1;
      document.getElementById('contact-btn').textContent = t.contactBtn;
      // replace {year} placeholder with current year so footer always stays up-to-date
      var footerRaw = t.footerText || '';
      var footerRendered = footerRaw.replace('{year}', new Date().getFullYear());
      document.getElementById('footer-text').innerHTML = footerRendered;
    }
    var defaultLang = 'ja';
    document.getElementById('lang-select').value = defaultLang;
    setLang(defaultLang);
    // 「about」画像を白いカード内部からカード外（上部中央）に移動する
    (function moveAboutGraphic() {
      try {
        var main = document.querySelector('main');
        var wrapper = document.querySelector('.about-graphic-wrapper');
        if (!main || !wrapper) return;
        // すでに main の先頭にある場合は移動しない
        if (main.firstElementChild === wrapper) return;
        main.insertBefore(wrapper, main.firstElementChild);
        wrapper.style.textAlign = 'center';
        wrapper.style.marginBottom = '1rem';
        var img = wrapper.querySelector('#about-graphic');
        if (img) {
          img.style.maxWidth = '360px';
          img.style.width = '80%';
          img.style.height = 'auto';
          img.style.display = 'inline-block';
          img.style.borderRadius = '8px';
        }
      } catch (e) { console.error(e) }
    })();
  </script>

</body>

<script>
  function setLang(v) {
    const map = {
      'en': './index.html',
      'ja': './cn.html',
      'zh-TW': './zh-TW.html',
      'ja': './ja.html'
    };
    location.href = map[v] || './index.html';
  }
</script>

</html>
