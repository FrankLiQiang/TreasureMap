<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TreasureMap – 技术支持</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.6;
    }

    header {
      background: #1d1d1f;
      color: #f5f5f7;
      padding: 2rem 1.5rem;
      text-align: center;
      position: relative;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.4rem;
      color: #a1a1a6;
      font-size: 1rem;
    }

    #lang-selector {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
    }

    #lang-selector select {
      background: #2c2c2e;
      color: #f5f5f7;
      border: 1px solid #48484a;
      border-radius: 6px;
      padding: 0.35rem 0.6rem;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }

    #lang-selector select:hover {
      border-color: #636366;
    }

    main {
      max-width: 760px;
      margin: 2.5rem auto;
      padding: 0 1.5rem 3rem;
    }

    section {
      background: #ffffff;
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .08);
    }

    section h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #1d1d1f;
    }

    section p,
    section li {
      font-size: 0.975rem;
      color: #3a3a3c;
    }

    section ul {
      padding-left: 1.4rem;
    }

    /* privacy list: no bullet, we include numeric labels in the question text */
    #privacy-list {
      list-style: none;
      padding-left: 0;
      margin-top: 0.5rem;
    }

    #privacy-list li {
      margin-top: 0.9rem;
    }

    section ul li {
      margin-bottom: 0.5rem;
    }

    /* FAQ question / answer layout */
    section ul li .faq-question {
      font-weight: 700;
      display: block;
      margin-bottom: 0.25rem;
      color: #1d1d1f;
    }

    section ul li .faq-answer {
      display: block;
      color: #3a3a3c;
      white-space: pre-wrap;
      margin-left: 0.25rem;
    }

    a {
      color: #0071e3;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .contact-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.6rem 1.4rem;
      background: #0071e3;
      color: #fff;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
    }

    .contact-btn:hover {
      background: #0077ed;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #6e6e73;
    }

    .info-line {
      line-height: 1.6;
      display: flex;
      align-items: flex-start;
      gap: 0.6em;
    }

    .info-label {
      flex: 0 0 9.5em;
      text-align: right;
      margin: 0;
      /* spacing now handled by gap */
    }

    .info-label.info-label-auto {
      flex: 0 0 auto;
      text-align: left;
      width: auto;
    }

    .info-value {
      flex: 1 1 0;
      margin: 0;
      max-width: 60ch;
    }

    .info-label-auto {
      display: inline;
      width: auto;
      text-align: left;
      margin-right: 0.6em;
    }

    #about-p1 .info-line:first-of-type {
      margin-top: 0.8em;
    }

    /* Responsive: move language selector to header's bottom-right on small screens */
    @media (max-width: 600px) {
      header {
        padding: 1.25rem 1rem;
        text-align: left;
      }

      /* place selector at header's right-bottom to reduce vertical space */
      #lang-selector {
        top: auto;
        bottom: 8px;
        right: 12px;
        position: absolute;
      }

      /* enlarge touch target and ensure visibility */
      #lang-selector select {
        min-width: 44px;
        min-height: 44px;
        padding: 0.4rem 0.6rem;
        font-size: 0.95rem;
      }

      /* reserve space so title doesn't overlap the selector */
      #site-title {
        padding-right: 110px;
        font-size: 1.25rem;
      }

      header p {
        margin-top: 0.3rem;
        color: #a1a1a6;
        font-size: 0.95rem;
      }
    }

    /* Store badges (Microsoft / App Store / Google Play) — match ja.html sizing */
    .store-badges {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 20px 0 36px;
      flex-wrap: wrap;
    }

    .store-badges a {
      display: inline-block;
    }

    .store-badges img {
      height: 48px;
      max-width: 160px;
      width: auto;
      display: block;
    }

    /* Pill-style badge buttons (white background, rounded, shadow) */
    .badge-button {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      border-radius: 999px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
      padding: 8px 18px;
      min-width: 220px;
      height: 56px;
      text-decoration: none;
    }

    .badge-button.store-badge-disabled {
      cursor: default;
      pointer-events: none;
      opacity: 0.98;
    }

    .badge-button img {
      max-height: 36px;
      max-width: 80%;
      height: auto;
      width: auto;
      display: block;
    }

    .badge-inner-img {
      max-height: 36px;
      width: auto;
      display: block;
    }

    /* badge content (icon + text) implemented with inline SVG + text */
    .badge-content {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      justify-content: center;
    }

    .badge-icon {
      flex: 0 0 auto;
      width: 56px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .badge-text {
      text-align: left;
      line-height: 1;
      color: #333;
    }

    .badge-subtext {
      display: block;
      font-size: 11px;
      letter-spacing: 0.02em;
      color: #7a7a7a;
      text-transform: uppercase;
    }

    .badge-maintext {
      display: block;
      font-size: 18px;
      font-weight: 600;
      color: #222;
      margin-top: 2px;
    }

    /* inner area for badge images: use white background (no black) with subtle border */
    .inner-rect {
      display: inline-block;
      background: #ffffff;
      border-radius: 8px;
      padding: 6px 12px;
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .inner-rect img {
      display: block;
      height: 28px;
      width: auto;
    }

    @media (max-width: 600px) {
      .badge-button {
        min-width: 140px;
        height: 48px;
        padding: 6px 12px;
      }

      .badge-button img {
        max-height: 28px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div id="lang-selector">
      <select id="lang-select" onchange="setLang(this.value)">
        <option value="en">English</option>
        <option value="zh-CN" selected>简体中文</option>
        <option value="zh-TW">繁体中文</option>
        <option value="ja">日本語</option>
      </select>
    </div>
    <h1 id="site-title">TreasureMap</h1>
    <p id="header-subtitle"></p>
  </header>

  <main>

    <section>
      <div class="about-graphic-wrapper">
        <img id="about-graphic" class="protected" src="about.png" alt="About graphic" oncontextmenu="return false;"
          draggable="false">
        <script>
          document.addEventListener('contextmenu', function (e) {
            if (e.target && e.target.tagName === 'IMG') {
              e.preventDefault();
            }
          }, { capture: true });
        </script>
      </div>
      <h2 id="about-title"></h2>
      <div id="about-p1"></div>
    </section>

    <section>
      <h2 id="faq-title"></h2>
      <ul id="faq-list"></ul>
    </section>

    <section>
      <h2 id="privacy-title"></h2>
      <p id="privacy-p1"></p>
      <ul id="privacy-list"></ul>
    </section>

    <section>
      <h2 id="contact-title"></h2>
      <p id="contact-p1"></p>
      <a class="contact-btn" id="contact-btn" href="https://github.com/FrankLiQiang/TreasureMap/issues"></a>
    </section>

  </main>

  <div class="store-badges">
    <span class="badge-button store-badge-disabled" aria-hidden="true">
      <div class="badge-content">
        <div class="badge-icon" aria-hidden="true">
          <!-- generic download arrow icon for App Store -->
          <svg width="40" height="28" viewBox="0 0 40 28" fill="none" xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true">
            <rect x="0" y="0" width="40" height="28" rx="6" fill="#ffffff" />
            <path d="M20 8v8" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M14 14l6-6 6 6" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <div class="badge-text">
          <span class="badge-subtext">Download on the</span>
          <span class="badge-maintext">App Store</span>
        </div>
      </div>
    </span>

    <span class="badge-button store-badge-disabled" aria-hidden="true">
      <div class="badge-content">
        <div class="badge-icon" aria-hidden="true">
          <!-- generic play triangle for Google Play -->
          <svg width="40" height="28" viewBox="0 0 40 28" fill="none" xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true">
            <rect x="0" y="0" width="40" height="28" rx="6" fill="#ffffff" />
            <path d="M14 8v12l10-6-10-6z" fill="#111" />
          </svg>
        </div>
        <div class="badge-text">
          <span class="badge-subtext">Get it on</span>
          <span class="badge-maintext">Google Play</span>
        </div>
      </div>
    </span>

    <a class="badge-button" href="https://apps.microsoft.com/detail/9nvhjmqmp3bl?referrer=appbadge&hl=zh-cn&gl=JP"
      target="_blank" rel="noopener noreferrer">
      <div class="badge-content">
        <div class="badge-icon" aria-hidden="true">
          <!-- generic 4-square icon for Microsoft -->
          <svg width="40" height="28" viewBox="0 0 40 28" fill="none" xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true">
            <rect x="0" y="0" width="40" height="28" rx="6" fill="#ffffff" />
            <g transform="translate(6,5)">
              <rect x="0" y="0" width="8" height="8" fill="#e74c3c" />
              <rect x="10" y="0" width="8" height="8" fill="#f1c40f" />
              <rect x="0" y="10" width="8" height="8" fill="#2ecc71" />
              <rect x="10" y="10" width="8" height="8" fill="#3498db" />
            </g>
          </svg>
        </div>
        <div class="badge-text">
          <span class="badge-subtext">Download from the</span>
          <span class="badge-maintext">Microsoft Store</span>
        </div>
      </div>
    </a>
  </div>

  <footer id="footer-text"></footer>

  <script>
    var i18n = {
      'zh-CN': {
        htmlLang: 'zh-CN',
        pageTitle: '藏宝图',
        headerSubtitle: '技术支持',
        aboutTitle: '📖 关于本应用',
        aboutP1: '“藏宝图”是一款用于保护机密信息的跨平台应用，可将文档、图片、音频和视频等信息安全地嵌入图片，且外观无明显变化。并提供不受大小限制、无需依附于图片载体的独立文件级加密机制。',
        aboutHtml: '<p>“藏宝图”是一款用于保护机密信息的跨平台应用，可将文档、图片、音频和视频等信息安全地嵌入图片，且外观无明显变化。并提供不受大小限制、无需依附于图片载体的独立文件的高级加密机制。</p><div class="info-line"><span class="info-label"><strong>主要功能：</strong></span><span class="info-value">列表、文字、文件的嵌入，以及文件自身加密（无需图片）</span></div> <div class="info-line"><span class="info-label"><strong>应用场景：</strong></span><span class="info-value">重要信息保存、异地备份。</span></div> <div class="info-line"><span class="info-label"><strong>支持平台：</strong></span><span class="info-value">iOS、Android、macOS、Windows。</span></div>',
        faqTitle: '❓ 常见问题',
        faqItems: [
          { q: '如何更改/删除隐藏文件？', a: '想要修改隐藏文件，只有在“文件界面”→“选择文件”，再次选择修改后的文件并加密保存后才会写回图片。\n要取消隐藏，请在“文件”页面点击“取消选择”并加密保存。\n正常退出或切换时会删除解密出的隐藏文件，异常退出可能遗留。' },
          { q: '如何对文件自身加密而不依赖宿主图片？', a: '在“文件自身”界面，可对文件单独以密码加密（无需图片）。加密文件仅能用本应用解密，请妥善保管密码，否则无法找回。\n本应用无法判断密码是否正确，如果使用了错误的密码解密后，无法用相应软件打开文件，请使用相同的（刚刚错误输入的）密码恢复到解密前状态。' },
          { q: '如何删除原图？覆盖规则是什么？', a: '宿主图片：Windows/macOS 会覆盖原图。Android/iOS 每次保存会生成新图片；用户自行决定是否删除原图。\n隐藏文件：解密出的隐藏文件会覆盖同名文件。\n文件自身：解密或加密出的文件会覆盖同名文件。' },
          { q: '如何更改图片密码？', a: '用原密码打开图片，在“主页”→“加密”中输入新密码两次确认以加密保存信息到图片，从而更改图片密码。' },
          { q: '如何更改宿主图片？', a: '解锁原图后，点击“选择图片”选择新图，再点击“加密”即可将信息写入新图；原图仍可保留。' },
          { q: '对宿主图片，如何传输与分享？什么是校验码？', a: '跨平台/设备传输请发送原始图片，否则无法解密。\n使用“复制校验码”可获取图片校验码，只有相同校验码的图片才能解密出相同信息。\n只分享原图和校验码，不会泄露信息。只有原图+密码+本应用才会解开图片信息。' }
        ],
        privacyItems: [
          { q: '1. 信息收集说明', a: '本应用不会主动收集、上传或存储用户的个人文件内容。\n本应用不建立用户账户系统。\n本应用不提供服务器存储服务。\n所有数据处理均在用户本地设备内完成。' },
          { q: '2. 权限使用说明', a: '为实现功能，本应用可能申请以下权限：\n存储访问权限：用于读取及隐藏文件到宿主图片以及文件自身的加密解密。\n媒体访问权限：以保存隐藏信息到宿主图片。\n上述权限仅用于功能实现，不用于数据收集。' },
          { q: '3. 数据传输说明', a: '本应用不进行任何远程数据传输。\n本应用不向任何第三方提供用户文件内容。' },
          { q: '4. 数据安全', a: '所有文件均保存在用户设备本地。\n用户应自行妥善保管密码及设备安全。\n本应用不提供密码找回功能。' },
          { q: '5. 第三方服务', a: '对于付费用户，本应用不集成广告服务。\n本应用不集成用户行为分析服务。\n如未来集成第三方服务，将在本政策中更新说明。' },
          { q: '6. 政策变更', a: '本应用有权根据法律或功能更新需要对本政策进行修改。\n修改后将会在应用内公布。' }
        ],
        privacyTitle: '🔒 隐私政策',
        contactTitle: '📬 联系我们',
        contactP1: '<p>如有任何问题或建议，欢迎通过以下方式联系我们：</p><p>电子邮件：treasuremap365.lq@gmail.com</p><p>&nbsp;</p><p>GitHub Issues:</p>',
        contactBtn: '提交问题',
        footerText: '© {year} Frank. Li Qiang · TreasureMap'
      },
    };

    function setLang(lang) {
      var t = i18n[lang];
      if (!t) return;

      document.documentElement.lang = t.htmlLang;
      document.title = t.pageTitle;
      var siteTitle = document.getElementById('site-title');
      if (siteTitle) siteTitle.textContent = t.pageTitle;
      document.getElementById('header-subtitle').textContent = t.headerSubtitle;
      document.getElementById('about-title').textContent = t.aboutTitle;

      var aboutP = t.aboutP1 || '';
      var aboutHtml = t.aboutHtml ? t.aboutHtml : null;
      if (aboutHtml) {
        // ensure label spans use the auto class so labels are left-aligned
        aboutHtml = aboutHtml.replace(/<span class="info-label">/g, '<span class="info-label info-label-auto">');
        document.getElementById('about-p1').innerHTML = aboutHtml.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
      } else {
        document.getElementById('about-p1').innerHTML = aboutP.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
      }
      // Trim leading fullwidth/normal spaces inside .info-value to avoid visible indentation
      document.querySelectorAll('#about-p1 .info-value').forEach(function (el) {
        if (!el) return;
        el.textContent = (el.textContent || '').replace(/^[\s\u3000]+/, '');
      });

      document.getElementById('faq-title').textContent = t.faqTitle;
      var faqList = document.getElementById('faq-list');
      faqList.innerHTML = '';
      (t.faqItems || []).forEach(function (item) {
        var li = document.createElement('li');
        var qEl = document.createElement('div');
        qEl.className = 'faq-question';
        qEl.textContent = item.q.replace(/^[\s\u3000]+/, '');
        var aEl = document.createElement('div');
        aEl.className = 'faq-answer';
        aEl.textContent = item.a.replace(/^[\s\u3000]+/, '');
        li.appendChild(qEl);
        li.appendChild(aEl);
        faqList.appendChild(li);
      });

      document.getElementById('privacy-title').textContent = t.privacyTitle;
      var privacyP = document.getElementById('privacy-p1');
      var privacyList = document.getElementById('privacy-list');
      if (t.privacyItems && t.privacyItems.length) {
        privacyP.style.display = 'none';
        privacyList.innerHTML = '';
        (t.privacyItems || []).forEach(function (item) {
          var li = document.createElement('li');
          var qEl = document.createElement('div');
          qEl.className = 'faq-question';
          qEl.textContent = item.q.replace(/^[\s\u3000]+/, '');
          var aEl = document.createElement('div');
          aEl.className = 'faq-answer';
          aEl.textContent = item.a.replace(/^[\s\u3000]+/, '');
          li.appendChild(qEl);
          li.appendChild(aEl);
          privacyList.appendChild(li);
        });
      } else {
        privacyList.innerHTML = '';
        privacyP.style.display = '';
        privacyP.textContent = t.privacyP1;
      }
      document.getElementById('contact-title').textContent = t.contactTitle;
      // contactP1 may contain HTML (paragraphs/links). Use innerHTML so paragraphs break correctly.
      document.getElementById('contact-p1').innerHTML = t.contactP1;
      document.getElementById('contact-btn').textContent = t.contactBtn;
      // replace {year} placeholder with current year so footer always stays up-to-date
      var footerRaw = t.footerText || '';
      var footerRendered = footerRaw.replace('{year}', new Date().getFullYear());
      document.getElementById('footer-text').innerHTML = footerRendered;
    }
    var defaultLang = 'zh-CN';
    document.getElementById('lang-select').value = defaultLang;
    setLang(defaultLang);
    // 将关于图像从白色卡片内部移动到卡片外面（上方居中）
    (function moveAboutGraphic() {
      try {
        var main = document.querySelector('main');
        var wrapper = document.querySelector('.about-graphic-wrapper');
        if (!main || !wrapper) return;
        // 如果已经在 main 顶部则不移动
        if (main.firstElementChild === wrapper) return;
        main.insertBefore(wrapper, main.firstElementChild);
        wrapper.style.textAlign = 'center';
        wrapper.style.marginBottom = '1rem';
        var img = wrapper.querySelector('#about-graphic');
        if (img) {
          img.style.maxWidth = '360px';
          img.style.width = '80%';
          img.style.height = 'auto';
          img.style.display = 'inline-block';
          img.style.borderRadius = '8px';
        }
      } catch (e) { console.error(e) }
    })();
  </script>

</body>

<script>
  function setLang(v) {
    const map = {
      'en': './index.html',
      'zh-CN': './cn.html',
      'zh-TW': './zh-TW.html',
      'ja': './ja.html'
    };
    location.href = map[v] || './index.html';
  }
</script>

</html>
