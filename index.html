<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TreasureMap – 技术支持</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.6;
    }

    header {
      background: #1d1d1f;
      color: #f5f5f7;
      padding: 2rem 1.5rem;
      text-align: center;
      position: relative;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.4rem;
      color: #a1a1a6;
      font-size: 1rem;
    }

    #lang-selector {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
    }

    #lang-selector select {
      background: #2c2c2e;
      color: #f5f5f7;
      border: 1px solid #48484a;
      border-radius: 6px;
      padding: 0.35rem 0.6rem;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }

    #lang-selector select:hover {
      border-color: #636366;
    }

    main {
      max-width: 760px;
      margin: 2.5rem auto;
      padding: 0 1.5rem 3rem;
    }

    section {
      background: #ffffff;
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .08);
    }

    section h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #1d1d1f;
    }

    section p,
    section li {
      font-size: 0.975rem;
      color: #3a3a3c;
    }

    section ul {
      padding-left: 1.4rem;
    }

    section ul li {
      margin-bottom: 0.5rem;
    }

    /* FAQ question / answer layout */
    section ul li .faq-question {
      font-weight: 700;
      display: block;
      margin-bottom: 0.25rem;
      color: #1d1d1f;
    }

    section ul li .faq-answer {
      display: block;
      color: #3a3a3c;
      white-space: pre-wrap;
      margin-left: 0.25rem;
    }

    a {
      color: #0071e3;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .contact-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.6rem 1.4rem;
      background: #0071e3;
      color: #fff;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
    }

    .contact-btn:hover {
      background: #0077ed;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #6e6e73;
    }
    .info-line {
      line-height: 1.6;
      display: flex;
      align-items: flex-start;
      gap: 0.6em;
    }
    .info-label {
      flex: 0 0 9.5em;
      text-align: right;
      margin: 0; /* spacing now handled by gap */
    }
    .info-label.info-label-auto {
      flex: 0 0 auto;
      text-align: left;
      width: auto;
    }
    .info-value {
      flex: 1 1 0;
      margin: 0;
      max-width: 60ch;
    }
    .info-label-auto {
      display: inline;
      width: auto;
      text-align: left;
      margin-right: 0.6em;
    }
    #about-p1 .info-line:first-of-type {
      margin-top: 0.8em;
    }
    /* Responsive: move language selector to header's bottom-right on small screens */
    @media (max-width: 600px) {
      header {
        padding: 1.25rem 1rem;
        text-align: left;
      }

      /* place selector at header's right-bottom to reduce vertical space */
      #lang-selector {
        top: auto;
        bottom: 8px;
        right: 12px;
        position: absolute;
      }

      /* enlarge touch target and ensure visibility */
      #lang-selector select {
        min-width: 44px;
        min-height: 44px;
        padding: 0.4rem 0.6rem;
        font-size: 0.95rem;
      }

      /* reserve space so title doesn't overlap the selector */
      #site-title {
        padding-right: 110px;
        font-size: 1.25rem;
      }

      header p {
        margin-top: 0.3rem;
        color: #a1a1a6;
        font-size: 0.95rem;
      }
    }
  </style>
</head>

        <option value="en">English</option>
        <option value="ja">日本語</option>
      </select>
    </div>
    <h1 id="site-title">TreasureMap</h1>
    <p id="header-subtitle"></p>
  </header>

      'en': {

        pageTitle: 'Treasure Map',

        aboutTitle: '\uD83D\uDCD6 About',
        aboutP1: '“TreasureMap” is a cross-platform app for protecting confidential information. It can safely embed documents, videos, audio, and other files into images with no noticeable change in appearance. \n\n<strong>Main features:</strong> embedding lists, text, and files, and file-only encryption (no image required).\n<strong>Use cases:</strong> secure storage of important information, off-site backups, and encrypted communication.\n<strong>Supported platforms:</strong> iOS, Android, macOS, Windows.',
        aboutHtml: '<p>“TreasureMap” is a cross-platform app for protecting confidential information. It can safely embed documents, videos, audio, and other files into images with no noticeable change in appearance.</p>\n<div class="info-line"><span class="info-label info-label-auto"><strong>Main features:</strong></span><span class="info-value">embedding lists, text, and files, and file-only encryption (no image required).</span></div>\n<div class="info-line"><span class="info-label info-label-auto"><strong>Use cases:</strong></span><span class="info-value">secure storage of important information, off-site backups, and encrypted communication.</span></div>\n<div class="info-line"><span class="info-label info-label-auto"><strong>Supported platforms:</strong></span><span class="info-value">iOS, Android, macOS, Windows.</span></div>',
        faqTitle: '\u2753 FAQ',
        faqItems: [
          { q: 'How to change/remove a hidden file?', a: 'If you want to modify a hidden file, open the File screen → "Select File", reselect the modified file, then save using "Encrypt" to write the change back into the image.\nTo stop hiding a file, tap "Deselect" on the File screen and save with "Encrypt".\nWhen you exit normally or switch files, the decrypted hidden file is deleted; an abnormal exit may leave it behind.\nThe carrier image is never deleted by the app.' },
          { q: 'How to encrypt a file without a carrier image?', a: 'In the "File (Self)" screen you can encrypt a file with a password without using an image. Encrypted files created this way can only be decrypted by this app—keep passwords safe, there is no recovery.\nThe app cannot always tell whether a password is correct. If you decrypt with the wrong password and the resulting file cannot be opened by other software, use the same (incorrect) password again to restore the file to its pre-decrypted state.' },
          { q: 'How do I delete the original image? What are the overwrite rules?', a: 'Carrier image: On Windows and macOS, an encrypted save will overwrite the original image. On Android and iOS, each encrypted save creates a new image; the user may choose whether to delete the original.\nHidden file: A decrypted hidden file will overwrite any same‑named file in the destination folder.\nFile itself: Files produced by decrypting or encrypting will overwrite any same‑named file in the destination folder.' },
          { q: "How to change an image's password?", a: "Open the image with the current password, go to \"Select Image\" → \"Encrypt\", enter the new password twice and confirm to save the information into the image and change its password." },
          { q: 'How to replace the carrier image?', a: 'After unlocking the original image, tap "Select Image", choose the new image, then tap "Encrypt" to write the embedded information into the new image. The original image remains unchanged unless you delete it manually.' },
          { q: 'How do I transfer and share the carrier image? What is the verification code?', a: 'When transferring images between platforms or devices, always send the original image file; otherwise decryption may fail.\nOn the Select Image screen, tap the "Copy Verification Code" button to copy the image\'s verification code; only images with the same verification code will decrypt to the same embedded data.\nSharing only the original image and the verification code does not reveal the embedded data. Only the original image plus the password and this app can unlock the embedded information.' }

          { q: '\u5bbf\u4e3b\u753b\u50cf\u3092\u3069\u3046\u3084\u3063\u3066\u7f6e\u304d\u63db\u3048\u307e\u3059\u304b\uff1f', a: '\u5143\u753b\u50cf\u3092\u30a2\u30f3\u30ed\u30c3\u30af\u3057\u305f\u72b6\u614b\u3067\u300c\u753b\u50cf\u3092\u9078\u629e\u300d\u3092\u30bf\u30c3\u30d7\u3057\u3001\u65b0\u3057\u3044\u753b\u50cf\u3092\u9078\u3093\u3067\u304b\u3089\u300c\u6697\u53f7\u5316\u300d\u3092\u62bc\u3059\u3068\u3001\u57cb\u3081\u8fbc\u307e\u308c\u305f\u60c5\u5831\u304c\u65b0\u3057\u3044\u753b\u50cf\u306b\u66f8\u304d\u8fbc\u307e\u308c\u307e\u3059\u3002\u5143\u753b\u50cf\u306f\u624b\u52d5\u3067\u524a\u9664\u3057\u306a\u3044\u9650\u308a\u6b8b\u308a\u307e\u3059\u3002' },

function setLang(lang) {
      var t = i18n[lang];
      if (!t) return;

      function decodeEscapes(s) {
        if (typeof s !== 'string') return s;
        // convert literal backslash escapes like "\\n", "\\uXXXX" or "U0001f4d6" into real chars
        s = s.replace(/\\r/g, '\r').replace(/\\t/g, '\t').replace(/\\n/g, '\n');
        // \UXXXXXXXX (uppercase U) -> code point
        s = s.replace(/\\U([0-9a-fA-F]{8})/g, function (_, g) { return String.fromCodePoint(parseInt(g, 16)); });
        // bare UXXXXXXXX (some sources may have lost the backslash)
        s = s.replace(/\bU([0-9a-fA-F]{8})\b/g, function (_, g) { return String.fromCodePoint(parseInt(g, 16)); });
        // \uXXXX -> basic multilingual plane
        s = s.replace(/\\u([0-9a-fA-F]{4})/g, function (_, g) { return String.fromCharCode(parseInt(g, 16)); });
        return s;
      }

      document.documentElement.lang = t.htmlLang;
      document.title = decodeEscapes(t.pageTitle);
      var siteTitle = document.getElementById('site-title');
      if (siteTitle) siteTitle.textContent = decodeEscapes(t.pageTitle);
      document.getElementById('header-subtitle').textContent = decodeEscapes(t.headerSubtitle);
      document.getElementById('about-title').textContent = decodeEscapes(t.aboutTitle);

      var aboutP = decodeEscapes(t.aboutP1 || '');
      var aboutHtml = t.aboutHtml ? decodeEscapes(t.aboutHtml) : null;
      if (aboutHtml) {
        // ensure label spans use the auto class so labels are left-aligned
        aboutHtml = aboutHtml.replace(/<span class="info-label">/g, '<span class="info-label info-label-auto">');
        document.getElementById('about-p1').innerHTML = aboutHtml.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
      } else {
        document.getElementById('about-p1').innerHTML = aboutP.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
      }
      // Trim leading fullwidth/normal spaces inside .info-value to avoid visible indentation
      document.querySelectorAll('#about-p1 .info-value').forEach(function (el) {
        if (!el) return;
        el.textContent = (el.textContent || '').replace(/^[\s\u3000]+/, '');
      });

      document.getElementById('faq-title').textContent = decodeEscapes(t.faqTitle);
      var faqList = document.getElementById('faq-list');
      faqList.innerHTML = '';
      (t.faqItems || []).forEach(function (item) {
        var li = document.createElement('li');
        var qEl = document.createElement('div');
        qEl.className = 'faq-question';
        qEl.textContent = decodeEscapes(item.q).replace(/^[\s\u3000]+/, '');
        var aEl = document.createElement('div');
        aEl.className = 'faq-answer';
        aEl.textContent = decodeEscapes(item.a).replace(/^[\s\u3000]+/, '');
        li.appendChild(qEl);
        li.appendChild(aEl);
        faqList.appendChild(li);
      });

      document.getElementById('privacy-title').textContent = decodeEscapes(t.privacyTitle);
      document.getElementById('privacy-p1').textContent = decodeEscapes(t.privacyP1);
      document.getElementById('contact-title').textContent = decodeEscapes(t.contactTitle);
      document.getElementById('contact-p1').textContent = decodeEscapes(t.contactP1);
      document.getElementById('contact-btn').textContent = decodeEscapes(t.contactBtn);
      document.getElementById('footer-text').innerHTML = decodeEscapes(t.footerText);
    }
var defaultLang = 'en';
    document.getElementById('lang-select').value = defaultLang;
    setLang(defaultLang);
    // 将关于图像从白色卡片内部移动到卡片外面（上方居中）
    (function moveAboutGraphic(){
      try{
        var main = document.querySelector('main');
        var wrapper = document.querySelector('.about-graphic-wrapper');
        if (!main || !wrapper) return;
        // 如果已经在 main 顶部则不移动
        if (main.firstElementChild === wrapper) return;
        main.insertBefore(wrapper, main.firstElementChild);
        wrapper.style.textAlign = 'center';
        wrapper.style.marginBottom = '1rem';
        var img = wrapper.querySelector('#about-graphic');
        if (img){
          img.style.maxWidth = '360px';
          img.style.width = '60%';
          img.style.height = 'auto';
          img.style.display = 'inline-block';
          img.style.borderRadius = '8px';
        }
      }catch(e){console.error(e)}
    })();
  </script>
