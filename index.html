<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TreasureMap – 技术支持</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.6;
    }

    header {
      background: #1d1d1f;
      color: #f5f5f7;
      padding: 2rem 1.5rem;
      text-align: center;
      position: relative;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.4rem;
      color: #a1a1a6;
      font-size: 1rem;
    }

    #lang-selector {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
    }

    #lang-selector select {
      background: #2c2c2e;
      color: #f5f5f7;
      border: 1px solid #48484a;
      border-radius: 6px;
      padding: 0.35rem 0.6rem;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }

    #lang-selector select:hover {
      border-color: #636366;
    }

    main {
      max-width: 760px;
      margin: 2.5rem auto;
      padding: 0 1.5rem 3rem;
    }

    section {
      background: #ffffff;
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .08);
    }

    section h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #1d1d1f;
    }

    section p,
    section li {
      font-size: 0.975rem;
      color: #3a3a3c;
    }

    section ul {
      padding-left: 1.4rem;
    }

    section ul li {
      margin-bottom: 0.5rem;
    }

    /* FAQ question / answer layout */
    section ul li .faq-question {
      font-weight: 700;
      display: block;
      margin-bottom: 0.25rem;
      color: #1d1d1f;
    }

    section ul li .faq-answer {
      display: block;
      color: #3a3a3c;
      white-space: pre-wrap;
      margin-left: 0.25rem;
    }

    a {
      color: #0071e3;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .contact-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.6rem 1.4rem;
      background: #0071e3;
      color: #fff;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
    }

    .contact-btn:hover {
      background: #0077ed;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #6e6e73;
    }
    .info-line {
      line-height: 1.6;
    }
    .info-label {
      display: inline-block;
      width: 9.5em;
      text-align: right;
      margin-right: 0.6em;
      vertical-align: top;
    }
    .info-value {
      display: inline-block;
      vertical-align: top;
      max-width: 60ch;
    }
    .info-label-auto {
      display: inline;
      width: auto;
      text-align: left;
      margin-right: 0.6em;
    }
    #about-p1 .info-line:first-of-type {
      margin-top: 0.8em;
    }
  </style>
</head>

    <div id="lang-selector">
      <select id="lang-select" onchange="setLang(this.value)">

        <option value="en">English</option>
        <option value="ja">日本語</option>

    </section>

    <section>
      <h2 id="privacy-title"></h2>
      <p id="privacy-p1"></p>
    </section>

      <h2 id="contact-title"></h2>
      <p id="contact-p1"></p>
      <a class="contact-btn" id="contact-btn" href="https://github.com/FrankLiQiang/TreasureMap/issues"></a>

    function setLang(lang) {
      var t = i18n[lang];
      if (!t) return;
      document.documentElement.lang = t.htmlLang;
      document.title = t.pageTitle;
      var siteTitle = document.getElementById('site-title');
      if (siteTitle) siteTitle.textContent = t.pageTitle;
      document.getElementById('header-subtitle').textContent = t.headerSubtitle;
      document.getElementById('about-title').textContent = t.aboutTitle;
      if (t.aboutHtml) {
        document.getElementById('about-p1').innerHTML = t.aboutHtml;
      } else {
        document.getElementById('about-p1').innerHTML = t.aboutP1.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
      }
      document.getElementById('faq-title').textContent = t.faqTitle;
      var faqList = document.getElementById('faq-list');
      faqList.innerHTML = '';
      t.faqItems.forEach(function (item) {
        var li = document.createElement('li');
        var qEl = document.createElement('div');
        qEl.className = 'faq-question';
        qEl.textContent = item.q;
        var aEl = document.createElement('div');
        aEl.className = 'faq-answer';
        aEl.textContent = item.a;
        li.appendChild(qEl);
        li.appendChild(aEl);
        faqList.appendChild(li);
      });
      document.getElementById('privacy-title').textContent = t.privacyTitle;
      document.getElementById('privacy-p1').textContent = t.privacyP1;
      document.getElementById('contact-title').textContent = t.contactTitle;
      document.getElementById('contact-p1').textContent = t.contactP1;
      document.getElementById('contact-btn').textContent = t.contactBtn;
      document.getElementById('footer-text').innerHTML = t.footerText;
    }

    var defaultLang = 'en';
    document.getElementById('lang-select').value = defaultLang;
    setLang(defaultLang);
  </script>
