  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.6;
    }

    header {
      background: #1d1d1f;
      color: #f5f5f7;
      padding: 2rem 1.5rem;
      text-align: center;
      position: relative;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.4rem;
      color: #a1a1a6;
      font-size: 1rem;
    }

    #lang-selector {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
    }

    #lang-selector select {
      background: #2c2c2e;
      color: #f5f5f7;
      border: 1px solid #48484a;
      border-radius: 6px;
      padding: 0.35rem 0.6rem;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }

    #lang-selector select:hover {
      border-color: #636366;
    }

    main {
      max-width: 760px;
      margin: 2.5rem auto;
      padding: 0 1.5rem 3rem;
    }

    section {
      background: #ffffff;
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .08);
    }

    section h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #1d1d1f;
    }

    section p,
    section li {
      font-size: 0.975rem;
      color: #3a3a3c;
    }

    section ul {
      padding-left: 1.4rem;
    }

    section ul li {
      margin-bottom: 0.5rem;
    }

    /* FAQ question / answer layout */
    section ul li .faq-question {
      font-weight: 700;
      display: block;
      margin-bottom: 0.25rem;
      color: #1d1d1f;
    }

    section ul li .faq-answer {
      display: block;
      color: #3a3a3c;
      white-space: pre-wrap;
      margin-left: 0.25rem;
    }

    a {
      color: #0071e3;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .contact-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.6rem 1.4rem;
      background: #0071e3;
      color: #fff;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
    }

    .contact-btn:hover {
      background: #0077ed;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #6e6e73;
    }
    .info-line {
      line-height: 1.6;
    }
    .info-label {
      display: inline-block;
      width: 9.5em;
      text-align: right;
      margin-right: 0.6em;
      vertical-align: top;
    }
    .info-value {
      display: inline-block;
      vertical-align: top;
      max-width: 60ch;
    }
    .info-label-auto {
      display: inline;
      width: auto;
      text-align: left;
      margin-right: 0.6em;
    }
    #about-p1 .info-line:first-of-type {
      margin-top: 0.8em;
    }

      'en': {

        pageTitle: 'Treasure Map',
        headerSubtitle: 'Technical Support',
        aboutTitle: '\uD83D\uDCD6 About',
        aboutP1: '“TreasureMap” is a cross-platform app for protecting confidential information. It can safely embed documents, videos, audio, and other files into images with no noticeable change in appearance. \n\n<strong>Main features:</strong> embedding lists, text, and files, and file-only encryption (no image required).\n<strong>Use cases:</strong> secure storage of important information, off-site backups, and encrypted communication.\n<strong>Supported platforms:</strong> iOS, Android, macOS, Windows.',
        aboutHtml: '<p>“TreasureMap” is a cross-platform app for protecting confidential information. It can safely embed documents, videos, audio, and other files into images with no noticeable change in appearance.</p>\n<div class="info-line"><span class="info-label info-label-auto"><strong>Main features:</strong></span><span class="info-value">embedding lists, text, and files, and file-only encryption (no image required).</span></div>\n<div class="info-line"><span class="info-label info-label-auto"><strong>Use cases:</strong></span><span class="info-value">secure storage of important information, off-site backups, and encrypted communication.</span></div>\n<div class="info-line"><span class="info-label info-label-auto"><strong>Supported platforms:</strong></span><span class="info-value">iOS, Android, macOS, Windows.</span></div>',
        faqTitle: '\u2753 FAQ',
        faqItems: [
          { q: 'How to change/remove a hidden file?', a: 'If you want to modify a hidden file, open the File screen → "Select File", reselect the modified file, then save using "Encrypt" to write the change back into the image.\nTo stop hiding a file, tap "Deselect" on the File screen and save with "Encrypt".\nWhen you exit normally or switch files, the decrypted hidden file is deleted; an abnormal exit may leave it behind.\nThe carrier image is never deleted by the app.' },
          { q: 'How to encrypt a file without a carrier image?', a: 'In the "File (Self)" screen you can encrypt a file with a password without using an image. Encrypted files created this way can only be decrypted by this app—keep passwords safe, there is no recovery.\nThe app cannot always tell whether a password is correct. If you decrypt with the wrong password and the resulting file cannot be opened by other software, use the same (incorrect) password again to restore the file to its pre-decrypted state.' },
          { q: 'How do I delete the original image? What are the overwrite rules?', a: 'Carrier image: On Windows and macOS, an encrypted save will overwrite the original image. On Android and iOS, each encrypted save creates a new image; the user may choose whether to delete the original.\nHidden file: A decrypted hidden file will overwrite any same‑named file in the destination folder.\nFile itself: Files produced by decrypting or encrypting will overwrite any same‑named file in the destination folder.' },
          { q: "How to change an image's password?", a: "Open the image with the current password, go to \"Select Image\" → \"Encrypt\", enter the new password twice and confirm to save the information into the image and change its password." },
          { q: 'How to replace the carrier image?', a: 'After unlocking the original image, tap "Select Image", choose the new image, then tap "Encrypt" to write the embedded information into the new image. The original image remains unchanged unless you delete it manually.' },
          { q: 'How do I transfer and share the carrier image? What is the verification code?', a: 'When transferring images between platforms or devices, always send the original image file; otherwise decryption may fail.\nOn the Select Image screen, tap the "Copy Verification Code" button to copy the image\'s verification code; only images with the same verification code will decrypt to the same embedded data.\nSharing only the original image and the verification code does not reveal the embedded data. Only the original image plus the password and this app can unlock the embedded information.' }

function setLang(lang) {
      var t = i18n[lang];
      if (!t) return;
      // 对简体、繁体、日文在渲染前将 About 与 FAQ 字段转换为 ASCII 的十进制实体表示
      if (['zh-CN', 'zh-TW', 'ja'].includes(lang)) {
        if (t.aboutTitle) t.aboutTitle = encodeToEntities(t.aboutTitle);
        if (t.aboutP1) t.aboutP1 = encodeToEntities(t.aboutP1);
        if (t.aboutHtml) t.aboutHtml = encodeToEntities(t.aboutHtml);
        if (t.faqTitle) t.faqTitle = encodeToEntities(t.faqTitle);
        if (Array.isArray(t.faqItems)) {
          t.faqItems = t.faqItems.map(function (item) {
            return {
              q: encodeToEntities(item.q),
              a: encodeToEntities(item.a)
            };
          });
        }
      }

      document.documentElement.lang = t.htmlLang;
      document.title = t.pageTitle;
      var siteTitle = document.getElementById('site-title');
      if (siteTitle) siteTitle.textContent = t.pageTitle;
      document.getElementById('header-subtitle').textContent = t.headerSubtitle;
      // About
      document.getElementById('about-title').textContent = t.aboutTitle;
      if (t.aboutHtml) {
        // aboutHtml 可能包含标签，先替换实体中的换行为 <br> 形式再写入 innerHTML
        var aboutHtmlContent = t.aboutHtml.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
        document.getElementById('about-p1').innerHTML = aboutHtmlContent;
      } else {
        document.getElementById('about-p1').innerHTML = t.aboutP1.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
      }

      // FAQ
      document.getElementById('faq-title').textContent = t.faqTitle;
      var faqList = document.getElementById('faq-list');
      faqList.innerHTML = '';
      (t.faqItems || []).forEach(function (item) {
        var li = document.createElement('li');
        var qEl = document.createElement('div');
        qEl.className = 'faq-question';
        // 使用 innerHTML 渲染实体并保留换行格式
        qEl.innerHTML = (item.q || '').replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
        var aEl = document.createElement('div');
        aEl.className = 'faq-answer';
        aEl.innerHTML = (item.a || '').replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
        li.appendChild(qEl);
        li.appendChild(aEl);
        faqList.appendChild(li);
      });

      document.getElementById('privacy-title').textContent = t.privacyTitle;
      document.getElementById('privacy-p1').textContent = t.privacyP1;
      document.getElementById('contact-title').textContent = t.contactTitle;
      document.getElementById('contact-p1').textContent = t.contactP1;
      document.getElementById('contact-btn').textContent = t.contactBtn;
      document.getElementById('footer-text').innerHTML = t.footerText;
    }

    var defaultLang = 'en';
    document.getElementById('lang-select').value = defaultLang;
    setLang(defaultLang);
