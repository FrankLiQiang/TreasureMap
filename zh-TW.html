<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TreasureMap – 技术支持</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.6;
    }

    header {
      background: #1d1d1f;
      color: #f5f5f7;
      padding: 2rem 1.5rem;
      text-align: center;
      position: relative;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.4rem;
      color: #a1a1a6;
      font-size: 1rem;
    }

    #lang-selector {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
    }

    #lang-selector select {
      background: #2c2c2e;
      color: #f5f5f7;
      border: 1px solid #48484a;
      border-radius: 6px;
      padding: 0.35rem 0.6rem;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }

    #lang-selector select:hover {
      border-color: #636366;
    }

    main {
      max-width: 760px;
      margin: 2.5rem auto;
      padding: 0 1.5rem 3rem;
    }

    section {
      background: #ffffff;
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .08);
    }

    section h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #1d1d1f;
    }

    section p,
    section li {
      font-size: 0.975rem;
      color: #3a3a3c;
    }

    section ul {
      padding-left: 1.4rem;
    }

    /* privacy list: no bullet, we include numeric labels in the question text */
    #privacy-list {
      list-style: none;
      padding-left: 0;
      margin-top: 0.5rem;
    }

    #privacy-list li {
      margin-top: 0.9rem;
    }

    section ul li {
      margin-bottom: 0.5rem;
    }

    /* FAQ question / answer layout */
    section ul li .faq-question {
      font-weight: 700;
      display: block;
      margin-bottom: 0.25rem;
      color: #1d1d1f;
    }

    section ul li .faq-answer {
      display: block;
      color: #3a3a3c;
      white-space: pre-wrap;
      margin-left: 0.25rem;
    }

    a {
      color: #0071e3;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .contact-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.6rem 1.4rem;
      background: #0071e3;
      color: #fff;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
    }

    .contact-btn:hover {
      background: #0077ed;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #6e6e73;
    }

    .info-line {
      line-height: 1.6;
      display: flex;
      align-items: flex-start;
      gap: 0.6em;
    }

    .info-label {
      flex: 0 0 9.5em;
      text-align: right;
      margin: 0;
      /* spacing now handled by gap */
    }

    .info-label.info-label-auto {
      flex: 0 0 auto;
      text-align: left;
      width: auto;
    }

    .info-value {
      flex: 1 1 0;
      margin: 0;
      max-width: 60ch;
    }

    .info-label-auto {
      display: inline;
      width: auto;
      text-align: left;
      margin-right: 0.6em;
    }

    #about-p1 .info-line:first-of-type {
      margin-top: 0.8em;
    }

    /* Responsive: move language selector to header's bottom-right on small screens */
    @media (max-width: 600px) {
      header {
        padding: 1.25rem 1rem;
        text-align: left;
      }

      /* place selector at header's right-bottom to reduce vertical space */
      #lang-selector {
        top: auto;
        bottom: 8px;
        right: 12px;
        position: absolute;
      }

      /* enlarge touch target and ensure visibility */
      #lang-selector select {
        min-width: 44px;
        min-height: 44px;
        padding: 0.4rem 0.6rem;
        font-size: 0.95rem;
      }

      /* reserve space so title doesn't overlap the selector */
      #site-title {
        padding-right: 110px;
        font-size: 1.25rem;
      }

      header p {
        margin-top: 0.3rem;
        color: #a1a1a6;
        font-size: 0.95rem;
      }
    }
  </style>
</head>

  <header>

  <main>

            e.preventDefault();

      </div>
      <h2 id="about-title"></h2>
      <div id="about-p1"></div>
    </section>

    <section>
      <h2 id="faq-title"></h2>
      <ul id="faq-list"></ul>
    </section>

    <section>
      <h2 id="privacy-title"></h2>
      <p id="privacy-p1"></p>
      <ul id="privacy-list"></ul>
    </section>

    <section>
      <h2 id="contact-title"></h2>
      <p id="contact-p1"></p>
      <a class="contact-btn" id="contact-btn" href="https://github.com/FrankLiQiang/TreasureMap/issues"></a>
    </section>

  </main>

      'en': {
        htmlLang: 'en',
        pageTitle: 'Treasure Map',
        headerSubtitle: 'Technical Support',
        aboutTitle: '\uD83D\uDCD6 About',
        aboutP1: '“TreasureMap” is a cross-platform app for protecting confidential information. It can safely embed documents, videos, audio, and other files into images with no noticeable change in appearance. \n\n<strong>Main features:</strong> embedding lists, text, and files, and file-only encryption (no image required).\n<strong>Use cases:</strong> secure storage of important information, off-site backups, and encrypted communication.\n<strong>Supported platforms:</strong> iOS, Android, macOS, Windows.',
        aboutHtml: '<p>“TreasureMap” is a cross-platform app for protecting confidential information. It can safely embed documents, videos, audio, and other files into images with no noticeable change in appearance.</p>\n<div class="info-line"><span class="info-label info-label-auto"><strong>Main features:</strong></span><span class="info-value">embedding lists, text, and files, and file-only encryption (no image required).</span></div>\n<div class="info-line"><span class="info-label info-label-auto"><strong>Use cases:</strong></span><span class="info-value">secure storage of important information, off-site backups, and encrypted communication.</span></div>\n<div class="info-line"><span class="info-label info-label-auto"><strong>Supported platforms:</strong></span><span class="info-value">iOS, Android, macOS, Windows.</span></div>',
        faqTitle: '\u2753 FAQ',
        faqItems: [
          { q: 'How to change/remove a hidden file?', a: 'If you want to modify a hidden file, open the File screen → "Select File", reselect the modified file, then save using "Encrypt" to write the change back into the image.\nTo stop hiding a file, tap "Deselect" on the File screen and save with "Encrypt".\nWhen you exit normally or switch files, the decrypted hidden file is deleted; an abnormal exit may leave it behind.\nThe carrier image is never deleted by the app.' },
          { q: 'How to encrypt a file without a carrier image?', a: 'In the "File (Self)" screen you can encrypt a file with a password without using an image. Encrypted files created this way can only be decrypted by this app—keep passwords safe, there is no recovery.\nThe app cannot always tell whether a password is correct. If you decrypt with the wrong password and the resulting file cannot be opened by other software, use the same (incorrect) password again to restore the file to its pre-decrypted state.' },
          { q: 'How do I delete the original image? What are the overwrite rules?', a: 'Carrier image: On Windows and macOS, an encrypted save will overwrite the original image. On Android and iOS, each encrypted save creates a new image; the user may choose whether to delete the original.\nHidden file: A decrypted hidden file will overwrite any same‑named file in the destination folder.\nFile itself: Files produced by decrypting or encrypting will overwrite any same‑named file in the destination folder.' },
          { q: "How to change an image's password?", a: "Open the image with the current password, go to \"Select Image\" → \"Encrypt\", enter the new password twice and confirm to save the information into the image and change its password." },
          { q: 'How to replace the carrier image?', a: 'After unlocking the original image, tap "Select Image", choose the new image, then tap "Encrypt" to write the embedded information into the new image. The original image remains unchanged unless you delete it manually.' },
          { q: 'How do I transfer and share the carrier image? What is the verification code?', a: 'When transferring images between platforms or devices, always send the original image file; otherwise decryption may fail.\nOn the Select Image screen, tap the "Copy Verification Code" button to copy the image\'s verification code; only images with the same verification code will decrypt to the same embedded data.\nSharing only the original image and the verification code does not reveal the embedded data. Only the original image plus the password and this app can unlock the embedded information.' }
        ],
        privacyItems: [
          { q: '1. Information Collection', a: 'This application does not collect, upload, or store users\' personal file contents.\nNo account system is provided.\nNo cloud storage service is offered.\nAll data processing is performed locally on the user\'s device.' },
          { q: '2. Permissions', a: 'To provide the app\'s functionality, this application may request the following permissions:\nStorage access: used to read files and hide files into host images, and for encryption and decryption of those files.\nMedia access: used to save hidden information into host images.\nThe above permissions are used only to implement the app\'s features and are not used for data collection.' },
          { q: '3. Data Transmission', a: 'This application does not transmit user data to external servers.\nNo user file content is shared with third parties.' },
          { q: '4. Data Security', a: 'All files remain on the user\'s device.\nUsers are responsible for safeguarding their passwords and device security.\nPassword recovery is not supported.' },

        faqItems: [
          { q: '\u96a0\u3057\u305f\u30d5\u30a1\u30a4\u30eb\u306f\u3069\u3046\u3084\u3063\u3066\u5909\u66f4\uff0f\u524a\u9664\u3057\u307e\u3059\u304b\uff1f', a: '\u96a0\u3057\u305f\u30d5\u30a1\u30a4\u30eb\u3092\u5909\u66f4\u3059\u308b\u306b\u306f\u3001\u300c\u30d5\u30a1\u30a4\u30eb\u300d\u753b\u9762\u3067\u300c\u30d5\u30a1\u30a4\u30eb\u3092\u9078\u629e\u300d\u3092\u958b\u304d\u3001\u5909\u66f4\u6e08\u307f\u306e\u30d5\u30a1\u30a4\u30eb\u3092\u518d\u9078\u629e\u3057\u3066\u304b\u3089\u300c\u6697\u53f7\u5316\u300d\u3067\u4fdd\u5b58\u3057\u3066\u304f\u3060\u3055\u3044\u3002\n\u96a0\u3057\u8868\u793a\u3092\u89e3\u9664\u3059\u308b\u306b\u306f\u3001\u30d5\u30a1\u30a4\u30eb\u753b\u9762\u3067\u300c\u9078\u629e\u89e3\u9664\u300d\u3092\u30bf\u30c3\u30d7\u3057\u3001\u540c\u69d8\u306b\u300c\u6697\u53f7\u5316\u300d\u3067\u4fdd\u5b58\u3057\u307e\u3059\u3002\n\u901a\u5e38\u306e\u7d42\u4e86\u3084\u5207\u66ff\u6642\u306b\u306f\u5fa9\u53f7\u3055\u308c\u305f\u96a0\u3057\u30d5\u30a1\u30a4\u30eb\u306f\u81ea\u52d5\u3067\u524a\u9664\u3055\u308c\u307e\u3059\u304c\u3001\u7570\u5e38\u7d42\u4e86\u3057\u305f\u5834\u5408\u306f\u6b8b\u308b\u3053\u3068\u304c\u3042\u308a\u307e\u3059\u3002\n\u30db\u30b9\u30c8\u753b\u50cf\u306f\u30a2\u30d7\u30ea\u306b\u3088\u3063\u3066\u524a\u9664\u3055\u308c\u307e\u305b\u3093\u3002' },
          { q: '\u30d5\u30a1\u30a4\u30eb\u81ea\u4f53\u3092\u753b\u50cf\u306a\u3057\u3067\u6697\u53f7\u5316\u3059\u308b\u306b\u306f\u3069\u3046\u3059\u308c\u3070\u3044\u3044\u3067\u3059\u304b\uff1f', a: '\u306f\u3044\u3002\u300c\u30d5\u30a1\u30a4\u30eb\uff08\u81ea\u8eab\uff09\u300d\u753b\u9762\u3067\u3001\u30d5\u30a1\u30a4\u30eb\u3092\u30d1\u30b9\u30ef\u30fc\u30c9\u3067\u6697\u53f7\u5316\u3067\u304d\u307e\u3059\uff08\u753b\u50cf\u306f\u4e0d\u8981\uff09\u3002\u3053\u306e\u65b9\u6cd5\u3067\u4f5c\u6210\u3057\u305f\u6697\u53f7\u5316\u30d5\u30a1\u30a4\u30eb\u306f\u672c\u30a2\u30d7\u30ea\u3067\u306e\u307f\u5fa9\u53f7\u53ef\u80fd\u3067\u3059\u3002\u30d1\u30b9\u30ef\u30fc\u30c9\u306f\u5fc5\u305a\u53b3\u91cd\u306b\u4fdd\u7ba1\u3057\u3066\u304f\u3060\u3055\u3044\u3002\\n\u30a2\u30d7\u30ea\u306f\u5e38\u306b\u30d1\u30b9\u30ef\u30fc\u30c9\u306e\u6b63\u8aa4\u3092\u5224\u5225\u3067\u304d\u308b\u308f\u3051\u3067\u306f\u3042\u308a\u307e\u305b\u3093\u3002\u8aa4\u3063\u305f\u30d1\u30b9\u30ef\u30fc\u30c9\u3067\u5fa9\u53f7\u3057\u3066\u4ed6\u306e\u30bd\u30d5\u30c8\u3067\u958b\u3051\u306a\u3044\u5834\u5408\u306f\u3001\u540c\u3058\uff08\u8aa4\u3063\u3066\u5165\u529b\u3057\u305f\uff09\u30d1\u30b9\u30ef\u30fc\u30c9\u3092\u4f7f\u3063\u3066\u5143\u306e\u72b6\u614b\u306b\u623b\u3057\u3066\u304f\u3060\u3055\u3044\u3002' },

          { q: '\u7b2c3\u6761 \u30c7\u30fc\u30bf\u901a\u4fe1\u306b\u3064\u3044\u3066', a: '\u672c\u30a2\u30d7\u30ea\u306f\u5916\u90e8\u30b5\u30fc\u30d0\u30fc\u3078\u306e\u30c7\u30fc\u30bf\u9001\u4fe1\u3092\u884c\u3044\u307e\u305b\u3093\u3002\n\u7b2c\u4e09\u8005\u3078\u5229\u7528\u8005\u306e\u30d5\u30a1\u30a4\u30eb\u5185\u5bb9\u3092\u63d0\u4f9b\u3059\u308b\u3053\u3068\u306f\u3042\u308a\u307e\u305b\u3093\u3002' },
          { q: '\u7b2c4\u6761 \u30c7\u30fc\u30bf\u5b89\u5168\u6027', a: '\u3059\u3079\u3066\u306e\u30c7\u30fc\u30bf\u306f\u5229\u7528\u8005\u306e\u7aef\u672b\u5185\u306b\u4fdd\u5b58\u3055\u308c\u307e\u3059\u3002\n\u5229\u7528\u8005\u306f\u30d1\u30b9\u30ef\u30fc\u30c9\u304a\u3088\u3073\u7aef\u672b\u306e\u7ba1\u7406\u3092\u81ea\u5df1\u8cac\u4efb\u3067\u884c\u3046\u3082\u306e\u3068\u3057\u307e\u3059\u3002\n\u672c\u30a2\u30d7\u30ea\u306f\u30d1\u30b9\u30ef\u30fc\u30c9\u5fa9\u65e7\u6a5f\u80fd\u3092\u63d0\u4f9b\u3057\u3066\u304a\u308a\u307e\u305b\u3093\u3002' },
          { q: '\u7b2c5\u6761 \u7b2c\u4e09\u8005\u30b5\u30fc\u30d3\u30b9', a: '\u672c\u30a2\u30d7\u30ea\u306f\u5e83\u544a\u30b5\u30fc\u30d3\u30b9\u3092\u7d71\u5408\u3057\u3066\u304a\u308a\u307e\u305b\u3093\u3002\n\u5229\u7528\u72b6\u6cc1\u5206\u6790\u30b5\u30fc\u30d3\u30b9\u3082\u7d71\u5408\u3057\u3066\u304a\u308a\u307e\u305b\u3093\u3002\n\u5c06\u6765\u7d71\u5408\u3059\u308b\u5834\u5408\u306f\u3001\u672c\u30dd\u30ea\u30b7\u30fc\u3092\u66f4\u65b0\u3057\u307e\u3059\u3002' },
          { q: '\u7b2c6\u6761 \u30dd\u30ea\u30b7\u30fc\u5909\u66f4', a: '\u672c\u30a2\u30d7\u30ea\u306f\u3001\u6cd5\u4ee4\u307e\u305f\u306f\u6a5f\u80fd\u5909\u66f4\u306b\u5fdc\u3058\u3066\u672c\u30dd\u30ea\u30b7\u30fc\u3092\u6539\u5b9a\u3059\u308b\u5834\u5408\u304c\u3042\u308a\u307e\u3059\u3002\n\u6539\u5b9a\u5f8c\u306f\u30a2\u30d7\u30ea\u5185\u3067\u544a\u77e5\u3057\u307e\u3059\u3002' }
        ],
        privacyTitle: '🔒 プライバシーポリシー',
        contactTitle: '\uD83D\uDCEC \u304a\u554f\u3044\u5408\u308f\u305b',
        contactP1: '\u3054\u8cea\u554f\u3084\u3054\u610f\u898b\u304c\u3054\u3056\u3044\u307e\u3057\u305f\u3089\u3001\u4ee5\u4e0b\u306e\u65b9\u6cd5\u3067\u304a\u554f\u3044\u5408\u308f\u305b\u304f\u3060\u3055\u3044\uff1a',
        contactBtn: 'Issue \u3092\u9001\u308b',
        footerText: '\u00a9 {year} Frank. Li Qiang \u00b7 TreasureMap'
      }
    };

    function setLang(lang) {
      var t = i18n[lang];
      if (!t) return;

      function decodeEscapes(s) {
        if (typeof s !== 'string') return s;
        // convert literal backslash escapes like "\\n", "\\uXXXX" or "U0001f4d6" into real chars
        s = s.replace(/\\r/g, '\r').replace(/\\t/g, '\t').replace(/\\n/g, '\n');
        // \UXXXXXXXX (uppercase U) -> code point
        s = s.replace(/\\U([0-9a-fA-F]{8})/g, function (_, g) { return String.fromCodePoint(parseInt(g, 16)); });
        // bare UXXXXXXXX (some sources may have lost the backslash)
        s = s.replace(/\bU([0-9a-fA-F]{8})\b/g, function (_, g) { return String.fromCodePoint(parseInt(g, 16)); });
        // \uXXXX -> basic multilingual plane
        s = s.replace(/\\u([0-9a-fA-F]{4})/g, function (_, g) { return String.fromCharCode(parseInt(g, 16)); });
        return s;
      }

      document.documentElement.lang = t.htmlLang;
      document.title = decodeEscapes(t.pageTitle);
      var siteTitle = document.getElementById('site-title');
      if (siteTitle) siteTitle.textContent = decodeEscapes(t.pageTitle);
      document.getElementById('header-subtitle').textContent = decodeEscapes(t.headerSubtitle);
      document.getElementById('about-title').textContent = decodeEscapes(t.aboutTitle);

      var aboutP = decodeEscapes(t.aboutP1 || '');
      var aboutHtml = t.aboutHtml ? decodeEscapes(t.aboutHtml) : null;
      if (aboutHtml) {
        // ensure label spans use the auto class so labels are left-aligned
        aboutHtml = aboutHtml.replace(/<span class="info-label">/g, '<span class="info-label info-label-auto">');
        document.getElementById('about-p1').innerHTML = aboutHtml.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
      } else {
        document.getElementById('about-p1').innerHTML = aboutP.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
      }
      // Trim leading fullwidth/normal spaces inside .info-value to avoid visible indentation
      document.querySelectorAll('#about-p1 .info-value').forEach(function (el) {
        if (!el) return;
        el.textContent = (el.textContent || '').replace(/^[\s\u3000]+/, '');
      });

      document.getElementById('faq-title').textContent = decodeEscapes(t.faqTitle);
      var faqList = document.getElementById('faq-list');
      faqList.innerHTML = '';
      (t.faqItems || []).forEach(function (item) {
        var li = document.createElement('li');
        var qEl = document.createElement('div');
        qEl.className = 'faq-question';
        qEl.textContent = decodeEscapes(item.q).replace(/^[\s\u3000]+/, '');
        var aEl = document.createElement('div');
        aEl.className = 'faq-answer';
        aEl.textContent = decodeEscapes(item.a).replace(/^[\s\u3000]+/, '');
        li.appendChild(qEl);
        li.appendChild(aEl);
        faqList.appendChild(li);
      });

      document.getElementById('privacy-title').textContent = decodeEscapes(t.privacyTitle);
      var privacyP = document.getElementById('privacy-p1');
      var privacyList = document.getElementById('privacy-list');
      if (t.privacyItems && t.privacyItems.length) {
        privacyP.style.display = 'none';
        privacyList.innerHTML = '';
        (t.privacyItems || []).forEach(function (item) {
          var li = document.createElement('li');
          var qEl = document.createElement('div');
          qEl.className = 'faq-question';
          qEl.textContent = decodeEscapes(item.q).replace(/^[\s\u3000]+/, '');
          var aEl = document.createElement('div');
          aEl.className = 'faq-answer';
          aEl.textContent = decodeEscapes(item.a).replace(/^[\s\u3000]+/, '');
          li.appendChild(qEl);
          li.appendChild(aEl);
          privacyList.appendChild(li);
        });
      } else {
        privacyList.innerHTML = '';
        privacyP.style.display = '';
        privacyP.textContent = decodeEscapes(t.privacyP1);
      }
      document.getElementById('contact-title').textContent = decodeEscapes(t.contactTitle);
      document.getElementById('contact-p1').textContent = decodeEscapes(t.contactP1);
      document.getElementById('contact-btn').textContent = decodeEscapes(t.contactBtn);
      // replace {year} placeholder with current year so footer always stays up-to-date
      var footerRaw = decodeEscapes(t.footerText || '');
      var footerRendered = footerRaw.replace('{year}', new Date().getFullYear());
      document.getElementById('footer-text').innerHTML = footerRendered;
    }
    var defaultLang = 'zh-TW';
    document.getElementById('lang-select').value = defaultLang;
    setLang(defaultLang);
    // 将关于图像从白色卡片内部移动到卡片外面（上方居中）
    (function moveAboutGraphic() {
      try {
        var main = document.querySelector('main');
        var wrapper = document.querySelector('.about-graphic-wrapper');
        if (!main || !wrapper) return;
        // 如果已经在 main 顶部则不移动
        if (main.firstElementChild === wrapper) return;
        main.insertBefore(wrapper, main.firstElementChild);
        wrapper.style.textAlign = 'center';
        wrapper.style.marginBottom = '1rem';
        var img = wrapper.querySelector('#about-graphic');
        if (img) {
          img.style.maxWidth = '360px';
          img.style.width = '60%';
          img.style.height = 'auto';
          img.style.display = 'inline-block';
          img.style.borderRadius = '8px';
        }
      } catch (e) { console.error(e) }
    })();
  </script>

  function setLang(v) {
    const map = {
      'zh-TW': './zh-TW.html',
      'zh-CN': './cn.html',
      'en': './index.html',
      'ja': './ja.html'
    };
    location.href = map[v] || './index.html';
  }
</script>
