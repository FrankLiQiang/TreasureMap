<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TreasureMap – 技術支援</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.6;
    }

    header {
      background: #1d1d1f;
      color: #f5f5f7;
      padding: 2rem 1.5rem;
      text-align: center;
      position: relative;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.4rem;
      color: #a1a1a6;
      font-size: 1rem;
    }

    #lang-selector {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
    }

    #lang-selector select {
      background: #2c2c2e;
      color: #f5f5f7;
      border: 1px solid #48484a;
      border-radius: 6px;
      padding: 0.35rem 0.6rem;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }

    #lang-selector select:hover {
      border-color: #636366;
    }

    main {
      max-width: 760px;
      margin: 2.5rem auto;
      padding: 0 1.5rem 3rem;
    }

    section {
      background: #ffffff;
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .08);
    }

    section h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #1d1d1f;
    }

    section p,
    section li {
      font-size: 0.975rem;
      color: #3a3a3c;
    }

    section ul {
      padding-left: 1.4rem;
    }

    /* privacy list: no bullet, we include numeric labels in the question text */
    #privacy-list {
      list-style: none;
      padding-left: 0;
      margin-top: 0.5rem;
    }

    #privacy-list li {
      margin-top: 0.9rem;
    }

    section ul li {
      margin-bottom: 0.5rem;
    }

    /* FAQ question / answer layout */
    section ul li .faq-question {
      font-weight: 700;
      display: block;
      margin-bottom: 0.25rem;
      color: #1d1d1f;
    }

    section ul li .faq-answer {
      display: block;
      color: #3a3a3c;
      white-space: pre-wrap;
      margin-left: 0.25rem;
    }

    a {
      color: #0071e3;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .contact-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.6rem 1.4rem;
      background: #0071e3;
      color: #fff;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
    }

    .contact-btn:hover {
      background: #0077ed;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #6e6e73;
    }

    .info-line {
      line-height: 1.6;
      display: flex;
      align-items: flex-start;
      gap: 0.6em;
    }

    .info-label {
      flex: 0 0 9.5em;
      text-align: right;
      margin: 0;
      /* spacing now handled by gap */
    }

    .info-label.info-label-auto {
      flex: 0 0 auto;
      text-align: left;
      width: auto;
    }

    .info-value {
      flex: 1 1 0;
      margin: 0;
      max-width: 60ch;
    }

    .info-label-auto {
      display: inline;
      width: auto;
      text-align: left;
      margin-right: 0.6em;
    }

    #about-p1 .info-line:first-of-type {
      margin-top: 0.8em;
    }

    /* Responsive: move language selector to header's bottom-right on small screens */
    @media (max-width: 600px) {
      header {
        padding: 1.25rem 1rem;
        text-align: left;
      }

      /* place selector at header's right-bottom to reduce vertical space */
      #lang-selector {
        top: auto;
        bottom: 8px;
        right: 12px;
        position: absolute;
      }

      /* enlarge touch target and ensure visibility */
      #lang-selector select {
        min-width: 44px;
        min-height: 44px;
        padding: 0.4rem 0.6rem;
        font-size: 0.95rem;
      }

      /* reserve space so title doesn't overlap the selector */
      #site-title {
        padding-right: 110px;
        font-size: 1.25rem;
      }

      header p {
        margin-top: 0.3rem;
        color: #a1a1a6;
        font-size: 0.95rem;
      }
    }
  </style>
</head>

    <p id="header-subtitle"></p>

      </div>
      <h2 id="about-title"></h2>
      <div id="about-p1"></div>
    </section>

    <section>
      <h2 id="faq-title"></h2>
      <ul id="faq-list"></ul>
    </section>

    <section>
      <h2 id="privacy-title"></h2>
      <p id="privacy-p1"></p>
      <ul id="privacy-list"></ul>
    </section>

    <section>
      <h2 id="contact-title"></h2>
      <p id="contact-p1"></p>
      <a class="contact-btn" id="contact-btn" href="https://github.com/FrankLiQiang/TreasureMap/issues"></a>
    </section>

  </main>

          { q: '3. \u8cc7\u6599\u50b3\u8f38\u8aaa\u660e', a: '\u672c\u61c9\u7528\u4e0d\u9032\u884c\u4efb\u4f55\u9060\u7aef\u8cc7\u6599\u50b3\u8f38\u3002\n\u672c\u61c9\u7528\u4e0d\u5411\u7b2c\u4e09\u65b9\u63d0\u4f9b\u4f7f\u7528\u8005\u6a94\u6848\u5167\u5bb9\u3002' },
          { q: '4. \u8cc7\u6599\u5b89\u5168', a: '\u6240\u6709\u6a94\u6848\u5747\u5132\u5b58\u5728\u4f7f\u7528\u8005\u88dd\u7f6e\u672c\u5730\u3002\n\u4f7f\u7528\u8005\u61c9\u81ea\u884c\u59a5\u5584\u4fdd\u7ba1\u5bc6\u78bc\u53ca\u88dd\u7f6e\u5b89\u5168\u3002\n\u672c\u61c9\u7528\u4e0d\u63d0\u4f9b\u5bc6\u78bc\u627e\u56de\u529f\u80fd\u3002' },
          { q: '5. \u7b2c\u4e09\u65b9\u670d\u52d9', a: '\u672c\u61c9\u7528\u672a\u6574\u5408\u5ee3\u544a\u670d\u52d9\u3002\n\u672c\u61c9\u7528\u672a\u6574\u5408\u4f7f\u7528\u884c\u70ba\u5206\u6790\u670d\u52d9\u3002\n\u5982\u672a\u4f86\u6574\u5408\u76f8\u95dc\u670d\u52d9\uff0c\u5c07\u66f4\u65b0\u672c\u653f\u7b56\u5167\u5bb9\u3002' },
          { q: '6. \u653f\u7b56\u8b8a\u66f4', a: '\u672c\u61c9\u7528\u6709\u6b0a\u4f9d\u6cd5\u5f8b\u6216\u529f\u80fd\u66f4\u65b0\u9700\u8981\u4fee\u6539\u672c\u653f\u7b56\u3002\n\u4fee\u6539\u5f8c\u5c07\u65bc\u61c9\u7528\u5167\u516c\u5e03\u3002' }
        ],
        privacyTitle: '🔒 隱私政策',
        contactTitle: '\uD83D\uDCEC \u806f\u7d61\u6211\u5011',
        contactP1: '\u5982\u6709\u4efb\u4f55\u554f\u9898\u6216\u5efa\u8b70\uff0c\u6b61\u8fce\u900f\u904e\u4ee5\u4e0b\u65b9\u5f0f\u806f\u7d61\u6211\u5011\uff1a',
        contactBtn: '\u63d0\u4ea4\u554f\u9898',
        footerText: '\u00a9 {year} Frank. Li Qiang \u00b7 TreasureMap'
      },
    };

    function setLang(lang) {
      var t = i18n[lang];
      if (!t) return;

      function decodeEscapes(s) {
        if (typeof s !== 'string') return s;
        // convert literal backslash escapes like "\\n", "\\uXXXX" or "U0001f4d6" into real chars
        s = s.replace(/\\r/g, '\r').replace(/\\t/g, '\t').replace(/\\n/g, '\n');
        // \UXXXXXXXX (uppercase U) -> code point
        s = s.replace(/\\U([0-9a-fA-F]{8})/g, function (_, g) { return String.fromCodePoint(parseInt(g, 16)); });
        // bare UXXXXXXXX (some sources may have lost the backslash)
        s = s.replace(/\bU([0-9a-fA-F]{8})\b/g, function (_, g) { return String.fromCodePoint(parseInt(g, 16)); });
        // \uXXXX -> basic multilingual plane
        s = s.replace(/\\u([0-9a-fA-F]{4})/g, function (_, g) { return String.fromCharCode(parseInt(g, 16)); });
        return s;
      }

      document.documentElement.lang = t.htmlLang;
      document.title = decodeEscapes(t.pageTitle);
      var siteTitle = document.getElementById('site-title');
      if (siteTitle) siteTitle.textContent = decodeEscapes(t.pageTitle);
      document.getElementById('header-subtitle').textContent = decodeEscapes(t.headerSubtitle);
      document.getElementById('about-title').textContent = decodeEscapes(t.aboutTitle);

      var aboutP = decodeEscapes(t.aboutP1 || '');
      var aboutHtml = t.aboutHtml ? decodeEscapes(t.aboutHtml) : null;
      if (aboutHtml) {
        // ensure label spans use the auto class so labels are left-aligned
        aboutHtml = aboutHtml.replace(/<span class="info-label">/g, '<span class="info-label info-label-auto">');
        document.getElementById('about-p1').innerHTML = aboutHtml.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
      } else {
        document.getElementById('about-p1').innerHTML = aboutP.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
      }
      // Trim leading fullwidth/normal spaces inside .info-value to avoid visible indentation
      document.querySelectorAll('#about-p1 .info-value').forEach(function (el) {
        if (!el) return;
        el.textContent = (el.textContent || '').replace(/^[\s\u3000]+/, '');
      });

      document.getElementById('faq-title').textContent = decodeEscapes(t.faqTitle);
      var faqList = document.getElementById('faq-list');
      faqList.innerHTML = '';
      (t.faqItems || []).forEach(function (item) {
        var li = document.createElement('li');
        var qEl = document.createElement('div');
        qEl.className = 'faq-question';
        qEl.textContent = decodeEscapes(item.q).replace(/^[\s\u3000]+/, '');
        var aEl = document.createElement('div');
        aEl.className = 'faq-answer';
        aEl.textContent = decodeEscapes(item.a).replace(/^[\s\u3000]+/, '');
        li.appendChild(qEl);
        li.appendChild(aEl);
        faqList.appendChild(li);
      });

      document.getElementById('privacy-title').textContent = decodeEscapes(t.privacyTitle);
      var privacyP = document.getElementById('privacy-p1');
      var privacyList = document.getElementById('privacy-list');
      if (t.privacyItems && t.privacyItems.length) {
        privacyP.style.display = 'none';
        privacyList.innerHTML = '';
        (t.privacyItems || []).forEach(function (item) {
          var li = document.createElement('li');
          var qEl = document.createElement('div');
          qEl.className = 'faq-question';
          qEl.textContent = decodeEscapes(item.q).replace(/^[\s\u3000]+/, '');
          var aEl = document.createElement('div');
          aEl.className = 'faq-answer';
          aEl.textContent = decodeEscapes(item.a).replace(/^[\s\u3000]+/, '');
          li.appendChild(qEl);
          li.appendChild(aEl);
          privacyList.appendChild(li);
        });
      } else {
        privacyList.innerHTML = '';
        privacyP.style.display = '';
        privacyP.textContent = decodeEscapes(t.privacyP1);
      }
      document.getElementById('contact-title').textContent = decodeEscapes(t.contactTitle);
      document.getElementById('contact-p1').textContent = decodeEscapes(t.contactP1);
      document.getElementById('contact-btn').textContent = decodeEscapes(t.contactBtn);
      // replace {year} placeholder with current year so footer always stays up-to-date
      var footerRaw = decodeEscapes(t.footerText || '');
      var footerRendered = footerRaw.replace('{year}', new Date().getFullYear());
      document.getElementById('footer-text').innerHTML = footerRendered;
    }
    var defaultLang = 'zh-TW';
    document.getElementById('lang-select').value = defaultLang;
    setLang(defaultLang);
    // 将关于图像从白色卡片内部移动到卡片外面（上方居中）
    (function moveAboutGraphic() {
      try {
        var main = document.querySelector('main');
        var wrapper = document.querySelector('.about-graphic-wrapper');
        if (!main || !wrapper) return;
        // 如果已经在 main 顶部则不移动
        if (main.firstElementChild === wrapper) return;
        main.insertBefore(wrapper, main.firstElementChild);
        wrapper.style.textAlign = 'center';
        wrapper.style.marginBottom = '1rem';
        var img = wrapper.querySelector('#about-graphic');
        if (img) {
          img.style.maxWidth = '360px';
          img.style.width = '60%';
          img.style.height = 'auto';
          img.style.display = 'inline-block';
          img.style.borderRadius = '8px';
        }
      } catch (e) { console.error(e) }
    })();
  </script>

</body>

<script>
  function setLang(v) {
    const map = {
      'zh-TW': './zh-TW.html',
      'zh-CN': './cn.html',
      'en': './index.html',
      'ja': './ja.html'
    };
    location.href = map[v] || './index.html';
  }
</script>
